name: CI — Build, Lint & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─────────────────────────────────────────
  # SERVIDOR — TypeScript build + tests
  # ─────────────────────────────────────────
  server:
    name: Server (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Ejecutar tests
        run: npm run test:run
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_at_least_32_characters_long_for_ci
          JWT_REFRESH_SECRET: test_refresh_secret_at_least_32_characters_for_ci
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder_anon_key
          SUPABASE_SERVICE_KEY: placeholder_service_key

  # ─────────────────────────────────────────
  # CLIENTE — Next.js lint + type-check + build
  # ─────────────────────────────────────────
  client:
    name: Client (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit
        continue-on-error: true  # No fallar el CI por errores TS existentes aún

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5002/api/v1
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          JWT_SECRET: test_secret_at_least_32_characters_long_for_ci

      - name: Ejecutar tests
        run: npm test
        env:
          NODE_ENV: test

  # ─────────────────────────────────────────
  # SEGURIDAD — Audit de dependencias
  # ─────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit servidor
        run: npm audit --audit-level=high
        working-directory: server
        continue-on-error: true  # Reportar pero no bloquear por ahora

      - name: Audit cliente
        run: npm audit --audit-level=high
        working-directory: client
        continue-on-error: true
